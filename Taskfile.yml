# messenger — task-driven. Every op goes through a `task` verb; env comes from the
# dotenv files below (never the ambient shell). Copy .env.example -> .env and fill in
# the secret NAMES' values there.
version: "3"

dotenv: [".env"]

vars:
  BIN: messenger
  DIST: dist

tasks:
  default:
    cmds: [task -l]
    silent: true

  build:
    desc: Build the single static binary into dist/
    cmds:
      - CGO_ENABLED=0 go build -o {{.DIST}}/{{.BIN}} ./cmd/messenger
      - 'echo "built {{.DIST}}/{{.BIN}}"'

  vet:
    desc: go vet
    cmds: ["CGO_ENABLED=0 go vet ./..."]

  test:
    desc: Run the test suite
    cmds: ["CGO_ENABLED=0 go test ./..."]

  check:
    desc: build + vet + test (the green gate)
    cmds:
      - task: build
      - task: vet
      - task: test

  setup:
    desc: Scaffold ~/.config/messenger/config.toml + home dirs
    cmds: ["go run ./cmd/messenger setup {{.CLI_ARGS}}"]

  serve:
    desc: Run the HTTP server (channel webhooks + POST /send, GET /inbox, /health)
    cmds: ["go run ./cmd/messenger serve {{.CLI_ARGS}}"]

  listen:
    desc: Run the channel transports (append inbound to the inbox; optional --webhook push)
    cmds: ["go run ./cmd/messenger listen {{.CLI_ARGS}}"]

  send:
    desc: 'One-shot send, e.g. task send -- --channel telegram --text "hi" --to 123 --reply-to 42'
    cmds: ["go run ./cmd/messenger send {{.CLI_ARGS}}"]

  install-skill:
    desc: Symlink skills/messenger into ~/.claude/skills (and ./.claude/skills)
    cmds: ["bash skills/install.sh"]
